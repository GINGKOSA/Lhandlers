<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lhandlers Wiki</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="wiki.css">
</head>
<body>

<div class="topbar">
  <div class="hamburger" id="hamburger" onclick="toggleSidebar()" aria-label="Menu">
    <span></span><span></span><span></span>
  </div>
  <a class="topbar-logo" href="#home">✦ LHANDLERS</a>
  <div class="topbar-sep"></div>
  <input class="topbar-search" type="text" placeholder="Rechercher dans le wiki..." id="searchInput" oninput="liveSearch(this.value)">
  <div class="topbar-right">
    <div class="status-dot"></div>
    ELEBELLUM · v0.6
  </div>
</div>

<div class="layout">

  <!-- La sidebar est générée automatiquement par wiki.js depuis registry.js -->
  <nav class="sidebar" id="sidebar"></nav>

  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <main class="main" id="main-content">
    <div id="page-container">
      <div class="loading-page">Chargement…</div>
    </div>
  </main>

</div>

<!-- ═══════════════════════════════════════════════════════════════
     ARCHITECTURE v0.6
     - registry.js  : source unique de vérité (pages + sidebar + icônes)
     - wiki.js      : logique pure — sidebar auto-générée, lazy loading réel
     - pages/*.js   : contenu (un fichier par page, chargé à la demande)

     Pour ajouter une page :
       1. Créer pages/mon-id.js
       2. Ajouter une ligne dans registry.js
     C'est tout. Ne plus toucher ni index.html ni wiki.js.
     ═══════════════════════════════════════════════════════════════ -->
<script src="registry.js"></script>
<script src="wiki.js"></script>

</body>
</html>
